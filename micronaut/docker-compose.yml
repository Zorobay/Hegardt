services:
  postgres:
    image: postgres:16-alpine
    container_name: hegardt-postgres
    environment:
      POSTGRES_DB: hegardt
      POSTGRES_USER: hegardt
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hegardt -d hegardt"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
