datasources:
  default:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ''

flyway:
  enabled: false

jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: create-drop  # let Hibernate create schema for tests, bypassing Flyway
