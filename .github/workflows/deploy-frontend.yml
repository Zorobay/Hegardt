name: Deploy Frontend 💻

on:
  push:
    tags:
      - "v*"
 
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
 
jobs:
  lint:
    name: Lint frontend
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vue/package-lock.json
 
      - name: Install dependencies
        working-directory: vue
        run: npm ci
 
      - name: Run ESLint
        working-directory: vue
        run: npm run lint
 
  build-and-deploy:
    name: Build & deploy frontend
    runs-on: ubuntu-latest
    needs: lint
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vue/package-lock.json
 
      - name: Install dependencies
        working-directory: vue
        run: npm ci
 
      - name: Build
        working-directory: vue
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
 
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 2223 -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Copy dist to server
        run: |
          scp -i ~/.ssh/deploy_key -P 2223 -r vue/dist/. root@${{ secrets.SERVER_IP }}:/root/Hegardt/vue/dist/
 