name: Deploy Frontend

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only run if the tag is on branch 'main'
    if: github.ref_type == 'tag' && contains(github.event.base_ref, 'main')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vue/package-lock.json

      - name: Install dependencies
        working-directory: vue
        run: npm ci

      - name: Build
        working-directory: vue
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: vue/dist/*
          target: /var/www/hegardt.se/html/
          strip_components: 2

      - name: Set permissions and restart Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            chmod -R 755 /var/www/hegardt.se
            systemctl restart nginx