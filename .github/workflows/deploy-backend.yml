name: Deploy Backend ⚙️

on:
  push:
    tags:
      - "v*"
 
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
 
jobs:
  test:
    name: Test & lint backend
    runs-on: ubuntu-latest
 
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hegardt_test
          POSTGRES_USER: hegardt
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hegardt -d hegardt_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
 
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
 
      - name: Run CodeNarc
        working-directory: micronaut
        run: ./gradlew codenarcMain codenarcTest --no-daemon
 
      - name: Run Spock tests
        working-directory: micronaut
        run: ./gradlew test --no-daemon
        env:
          JDBC_URL: jdbc:postgresql://localhost:5432/hegardt_test
          DB_USER: hegardt
          DB_PASSWORD: secret
 
  build:
    name: Build & push backend image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
 
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./micronaut
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
 
  deploy:
    name: Deploy backend
    runs-on: ubuntu-latest
    needs: build
 
    steps:
      - name: Checkout (for docker-compose.yml)
        uses: actions/checkout@v4
 
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts
 
      - name: Copy docker-compose.yml to server
        run: |
          scp -i ~/.ssh/deploy_key docker-compose.yml root@${{ secrets.SERVER_IP }}:/root/Hegardt/docker-compose.yml
 
      - name: Pull image & restart containers
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.SERVER_IP }} bash << 'ENDSSH'
            set -e
            cd /root/Hegardt
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${{ needs.build.outputs.image_tag }}/" .env
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose --env-file .env pull
            docker compose --env-file .env up -d --remove-orphans
            docker image prune -f
          ENDSSH